<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KENOP — High‑Value Molecules</title>
  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    // Tailwind custom config (optional, can tweak if needed)
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            amber: {
              50: '#fffbeb',
              600: '#d97706',
              700: '#b45309'
            }
          }
        }
      }
    }
  </script>
  <!-- Lucide icons (vanilla) -->
  <script src="https://unpkg.com/lucide@latest"></script>
  <!-- React & ReactDOM -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <!-- Babel Standalone to transpile JSX in-browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Smooth scrolling for in-page nav */
    html { scroll-behavior: smooth; }
  </style>
</head>
<body class="min-h-screen w-full bg-white text-slate-900">
  <div id="root"></div>

  <script type="text/babel">
    const { useEffect } = React;

    function SectionHeader({ kicker, title }) {
      return (
        <div>
          <p className="text-xs uppercase tracking-widest text-amber-700">{kicker}</p>
          <h2 className="mt-1 text-2xl md:text-3xl font-bold">{title}</h2>
        </div>
      );
    }

    function Card({ title, desc, iconName }) {
      return (
        <div className="rounded-2xl border p-5 hover:shadow-md transition">
          <div className="flex items-center gap-3">
            <div className="rounded-xl bg-amber-50 p-2 text-amber-700">
              <i data-lucide={iconName} class="h-6 w-6"></i>
            </div>
            <h3 className="font-semibold">{title}</h3>
          </div>
          <p className="mt-2 text-sm text-slate-600">{desc}</p>
        </div>
      );
    }

    function ProdCard({ title, items }) {
      return (
        <div className="rounded-2xl border p-5 hover:border-amber-600 hover:shadow-md transition">
          <h3 className="font-semibold">{title}</h3>
          <ul className="mt-2 text-sm text-slate-600 list-disc list-inside space-y-1">
            {items.map((i, idx) => (<li key={idx}>{i}</li>))}
          </ul>
        </div>
      );
    }

    function CaseCard({ title, desc }) {
      return (
        <div className="rounded-2xl border p-5 hover:shadow-md transition">
          <h4 className="font-semibold">{title}</h4>
          <p className="mt-2 text-sm text-slate-600">{desc}</p>
        </div>
      );
    }

    function WhyCard({ iconName, title, desc }) {
      return (
        <div className="rounded-2xl border p-5">
          <div className="flex items-center gap-3">
            <div className="rounded-xl bg-amber-50 p-2 text-amber-700">
              <i data-lucide={iconName} class="h-6 w-6"></i>
            </div>
            <h4 className="font-semibold">{title}</h4>
          </div>
          <p className="mt-2 text-sm text-slate-600">{desc}</p>
        </div>
      );
    }

    function HomeMock() {
      // After each render, (re)draw Lucide icons
      useEffect(() => {
        if (window.lucide && window.lucide.createIcons) {
          window.lucide.createIcons();
        }
      });

      return (
        <div className="min-h-screen w-full bg-white text-slate-900">
          {/* Header */}
          <header className="sticky top-0 z-30 w-full border-b bg-white/80 backdrop-blur">
            <div className="mx-auto max-w-7xl px-4 py-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <div className="h-8 w-8 rounded-full bg-amber-400" />
                <span className="text-xl font-semibold tracking-tight">KENOP</span>
              </div>
              <nav className="hidden md:flex items-center gap-6 text-sm">
                <a className="hover:text-amber-600" href="#feedstocks">Feedstocks</a>
                <a className="hover:text-amber-600" href="#products">Products</a>
                <a className="hover:text-amber-600" href="#pathways">Pathways</a>
                <a className="hover:text-amber-600" href="#methodology">Test Methodology</a>
                <a className="hover:text-amber-600" href="#engagement">Engagement</a>
                <a className="hover:text-amber-600" href="#cases">Case Snapshots</a>
                <a className="hover:text-amber-600" href="#whyus">Why Us</a>
                <a className="hover:text-amber-600" href="#contact">Contact</a>
              </nav>
            </div>
          </header>

          {/* Hero */}
          <section className="relative overflow-hidden">
            <div className="absolute inset-0 opacity-60 [background:radial-gradient(60%_60%_at_30%_10%,#fff_0%,#e2f3f3_40%,#ffffff_100%)]" />
            <div className="relative mx-auto max-w-7xl px-4 py-20 md:py-28">
              <div className="max-w-3xl">
                <h1 className="text-4xl md:text-6xl font-extrabold leading-tight tracking-tight">
                  Turning fatty acids, glycerides to <span className="text-amber-600">High‑Value Molecules</span>
                </h1>
                <p className="mt-5 text-lg md:text-xl text-slate-700 max-w-2xl">
                  Your EPC partner for converting acid oils, fatty acids, distillates, waxes, gums and unsaponifiables into specialty oleochemicals with global applications.
                </p>
                <div className="mt-8 flex flex-wrap gap-3">
                  <a href="#feedstocks" className="rounded-2xl bg-amber-600 px-5 py-3 text-white font-medium shadow hover:bg-amber-700 transition">Explore Feedstocks</a>
                  <a href="#contact" className="rounded-2xl border border-slate-300 px-5 py-3 font-medium hover:border-amber-600 hover:text-amber-700 transition">Talk to Us</a>
                </div>
              </div>
            </div>
          </section>

          {/* Intro 3 columns */}
          <section className="mx-auto max-w-7xl px-4 py-12">
            <div className="grid gap-6 md:grid-cols-3">
              <Card title="Feedstocks We Use" iconName="droplets"
                desc="Acid oil, distillates (PFAD/SFAD/RB), fatty acid, wax cakes, gums."/>
              <Card title="Products We Deliver" iconName="flask-conical"
                desc="Saturated & unsaturated acids, dimer acids, metallic salts, CBEs, MCTs, antioxidants, specialty esters."/>
              <Card title="Processes We Master" iconName="beaker"
                desc="Esterification, glycerolysis, epoxidation, isomerisation, polymerisation, distillation, solvent extraction, crystallisation."/>
            </div>
          </section>

          {/* Feedstocks Grid */}
          <section id="feedstocks" className="mx-auto max-w-7xl px-4 py-12">
            <SectionHeader kicker="Your by‑products, our raw materials" title="Feedstocks" />
            <div className="mt-6 grid gap-4 sm:grid-cols-2 lg:grid-cols-3">
              {["Acid Oil","PFAD / SFAD / RB Distillates","Fatty Acids","Crude Wax Cake, Gums","Shea / Palm Fractions","Crude Glycerol"].map((label, i) => (
                <div key={i} className="group rounded-2xl border p-5 hover:border-amber-600 hover:shadow-md transition">
                  <div className="flex items-center gap-3">
                    <i data-lucide="circle-dot" class="h-5 w-5 text-amber-600"></i>
                    <h3 className="font-semibold">{label}</h3>
                  </div>
                  <p className="mt-2 text-sm text-slate-600"></p>
                </div>
              ))}
            </div>
          </section>

          {/* Products */}
          <section id="products" className="mx-auto max-w-7xl px-4 py-12">
            <SectionHeader kicker="From streams to solutions" title="Product Families" />
            <div className="mt-6 grid gap-4 md:grid-cols-2 lg:grid-cols-4">
              <ProdCard title="Fatty Acids" items={["Esters","Dimer Acids","Metallic Stearates","Epoxides","Amines","Hydroxy esters"]} />
              <ProdCard title="Triglycerides" items={["CBE","MCT Oil","Structured Lipids","Glyceryl Esters","Polysorbates"]} />
              <ProdCard title="Esters" items={["IPP/IPM","Triacetin","Ascorbyl Palmitate","Custom Esters"]} />
              <ProdCard title="Unsaponifiables" items={["Tocopherols","Phytosterols","Oryzanol","Terpenes","Lignans"]} />
            </div>
          </section>

          {/* Pathways */}
          <section id="pathways" className="mx-auto max-w-7xl px-4 py-12">
            <SectionHeader kicker="Our toolbox" title="Reaction Pathways" />
            <div className="mt-6 grid gap-3 md:grid-cols-3">
              {["Esterification","Glycerolysis","Epoxidation","Isomerisation","Polymerisation","Distillation / Crystallisation / Extraction"].map((p, i) => (
                <div key={i} className="flex items-center gap-3 rounded-2xl border p-4 hover:border-amber-600 transition">
                  <i data-lucide="arrow-right-left" class="h-5 w-5 text-amber-600"></i>
                  <span className="font-medium">{p}</span>
                </div>
              ))}
            </div>
          </section>

          {/* Methodology */}
          <section id="methodology" className="mx-auto max-w-7xl px-4 py-12">
            <SectionHeader kicker="How we validate" title="Test Methodology" />
            <div className="mt-6 grid gap-4 md:grid-cols-3">
              <Card title="Analytics @ Source" iconName="beaker" desc="On-site GC/GC-MS, DSC, IV/AV/SV. Real-time tuning with your lab for faster loops." />
              <Card title="Stage-Gate Trials" iconName="flask-conical" desc="Bench → 3 parallel runs → acceptance specs. Documented SOPs and data packs after each gate." />
              <Card title="Scale-Up Readiness" iconName="factory" desc="Mass & energy balances, HAZOP-lite, utilities, and QA plan to move from lab to 10 TPD." />
            </div>
          </section>

          {/* Case snapshots */}
          <section id="cases" className="mx-auto max-w-7xl px-4 py-12">
            <SectionHeader kicker="Proof of value" title="Case Snapshots" />
            <div className="mt-6 grid gap-4 md:grid-cols-3">
              <CaseCard title="SOYA FATTY → UNSAP RECOVERY OF Tocopherol & Phytosterol" desc="From low‑value fatty acid to high‑value nutraceuticals." />
              <CaseCard title="RB Wax Cake → Refined Cosmetic Wax" desc="Unlocking purity and export potential from refinery by‑products." />
              <CaseCard title="Monomer FAs → Iso‑stearic" desc="From monomers to branched specialty acids." />
            </div>
          </section>

          {/* Why Us */}
          <section id="whyus" className="mx-auto max-w-7xl px-4 py-12">
            <SectionHeader kicker="Partner advantages" title="Why Us" />
            <div className="mt-6 grid gap-4 md:grid-cols-4">
              <WhyCard iconName="factory" title="EPCC Turnkey + R&D" desc="End-to-end: concept, design, procurement, construction, commissioning." />
              <WhyCard iconName="boxes" title="Proprietary Know‑How" desc="Waxes, tocopherols, iso‑stearic; confidential, IP‑led execution." />
              <WhyCard iconName="globe-2" title="Global Outlook" desc="India, Africa, SE Asia; export-grade specs & documentation." />
              <WhyCard iconName="lock-keyhole" title="Trusted & Secure" desc="Your process stays yours; NDAs and clean IP boundaries." />
            </div>
          </section>

          {/* Engagement */}
          <section id="engagement" className="mx-auto max-w-7xl px-4 py-12">
            <SectionHeader kicker="Ways to work together" title="Engagement Models" />
            <div className="mt-6 grid gap-4 md:grid-cols-4">
              <WhyCard iconName="shield-check" title="R&D Partner" desc="Joint problem-solving with your lab; rapid iteration & documentation." />
              <WhyCard iconName="arrow-right-left" title="Negotiation Partner" desc="Support during vendor/equipment negotiations with specs & benchmarks." />
              <WhyCard iconName="boxes" title="Joint IP Development" desc="Co-develop specific steps; side‑draws hosted at site with clear ownership." />
              <WhyCard iconName="factory" title="EPCC Turnkey" desc="Full-scope delivery from FEED, PFD/P&ID to commissioning & operator training." />
            </div>
          </section>

          {/* Contact */}
          <section id="contact" className="mx-auto max-w-7xl px-4 py-16">
            <SectionHeader kicker="Get in touch" title="Contact" />
            <form className="mt-6 grid gap-4 md:grid-cols-2">
              <input placeholder="Name" className="rounded-xl border p-3 outline-none focus:ring-2 focus:ring-amber-600" />
              <input placeholder="Email" className="rounded-xl border p-3 outline-none focus:ring-2 focus:ring-amber-600" />
              <input placeholder="Feedstock you handle" className="rounded-xl border p-3 outline-none focus:ring-2 focus:ring-amber-600 md:col-span-2" />
              <textarea placeholder="What would you like to explore?" rows={4} className="rounded-xl border p-3 outline-none focus:ring-2 focus:ring-amber-600 md:col-span-2"></textarea>
              <button type="button" className="w-fit rounded-2xl bg-amber-600 px-6 py-3 text-white font-medium hover:bg-amber-700">Send</button>
            </form>
          </section>

          {/* Footer */}
          <footer className="border-t">
            <div className="mx-auto max-w-7xl px-4 py-8 text-sm text-slate-600 flex flex-col md:flex-row gap-2 md:items-center md:justify-between">
              <p>© {new Date().getFullYear()} KENOP INDUSTRIES PVT LTD</p>
              <p>Pune • Aurangabad • <a className="underline hover:text-amber-700" href="#">LinkedIn</a></p>
            </div>
          </footer>
        </div>
      );
    }

    function App() { return <HomeMock />; }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>

  <script>
    // Ensure icons render on initial paint too (in case React mounts before lucide loads).
    document.addEventListener('DOMContentLoaded', function(){
      if (window.lucide && window.lucide.createIcons) {
        window.lucide.createIcons();
      }
    });
  </script>
</body>
</html>
